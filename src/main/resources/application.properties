spring.application.name=UberHaiti

# Gestion du Port
server.port=${PORT:0}

# Profil actif
spring.profiles.active=${APP_MODE:dev}

# Base de données
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/uber_ouest}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:49358485}

# Hibernate
spring.jpa.hibernate.ddl-auto=${DB_DDL:update}
spring.jpa.show-sql=true

# =========================================================================
# Clés de sécurité JWT (CRITIQUE)
# =========================================================================
# La clé ci-dessous fait exactement 64 caractères pour supporter HS512.
# Ne pas la réduire, sinon l'application refusera de démarrer.
app.jwt.secret=${JWT_SECRET:UberHaitiOuest2026_SecuriteMaximale_PortAuPrince_Haiti_LongKeyHS512}
app.jwt.expiration=86400000

# Sécurité des erreurs
server.error.include-message=always
server.error.include-stacktrace=never
logging.level.org.springframework.security=DEBUG



