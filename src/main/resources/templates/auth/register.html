<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Uber Ouest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-register { max-width: 500px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-uber { background-color: #000; color: #fff; border-radius: 8px; padding: 12px; transition: 0.3s; }
        .btn-uber:hover { background-color: #333; color: #fff; transform: translateY(-2px); }
        
        /* Style PRO pour l'erreur de mot de passe */
        .is-invalid-custom { border-color: #dc3545 !important; }
        .error-message { color: #dc3545; font-size: 0.85rem; margin-top: 5px; display: none; }
        
        /* Toggle mot de passe */
        .password-toggle { cursor: pointer; border-left: none; }
        .input-group-text i { width: 16px; text-align: center; }
        
        /* Animation chargement */
        .spinner-border { display: none; width: 1.2rem; height: 1.2rem; margin-right: 8px; }

        /* Notes d'information */
        .role-notice { display: none; font-size: 0.85rem; margin-top: 8px; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="card card-register p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Rejoignez <span class="text-primary">Uber Ouest</span></h2>
                    <p class="text-muted">Créez votre compte pour commencer à rouler.</p>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">NOM D'UTILISATEUR</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" id="username" class="form-control border-start-0" placeholder="ex: clarence77" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">MOT DE PASSE</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" id="password" class="form-control border-start-0 border-end-0" placeholder="Minimum 8 caractères" required>
                            <span class="input-group-text bg-white password-toggle" onclick="togglePassword('password', this)">
                                <i class="fas fa-eye text-muted"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">CONFIRMER MOT DE PASSE</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" id="confirmPassword" class="form-control border-start-0 border-end-0" placeholder="Confirmez votre mot de passe" required>
                            <span class="input-group-text bg-white password-toggle" onclick="togglePassword('confirmPassword', this)">
                                <i class="fas fa-eye text-muted"></i>
                            </span>
                        </div>
                        <div id="passwordMismatch" class="error-message"><i class="fas fa-exclamation-circle"></i> Les mots de passe ne correspondent pas.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold">JE SUIS UN :</label>
                        <select id="role" class="form-select border-1">
                            <option value="PASSAGER">Passager (Je cherche une course)</option>
                            <option value="CHAUFFEUR">Chauffeur (Je veux conduire)</option>
                            <option value="ADMIN">Administrateur (Gestion système)</option>
                        </select>
                        
                        <div id="driverNotice" class="role-notice text-info">
                            <i class="fas fa-info-circle"></i> Note : Les chauffeurs doivent être validés par l'admin après inscription.
                        </div>
                        <div id="adminNotice" class="role-notice text-danger fw-bold">
                            <i class="fas fa-shield-alt"></i> Attention : L'accès administrateur est réservé au personnel autorisé.
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn btn-uber w-100 fw-bold shadow-sm d-flex align-items-center justify-content-center">
                        <div class="spinner-border" role="status" id="loader"></div>
                        <span>S'INSCRIRE</span>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Déjà un compte ?</span> 
                    <a th:href="@{/login}" class="text-primary text-decoration-none fw-bold">Se connecter</a>
                </div>
            </div>
        </div>
    </div>

   <script>
    // --- NOUVEAUTÉ : Toggle Visibilité Mot de passe ---
    function togglePassword(inputId, iconElement) {
        const input = document.getElementById(inputId);
        const icon = iconElement.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Gestion de l'affichage des notes selon le rôle
    document.getElementById('role').addEventListener('change', (e) => {
        const val = e.target.value;
        document.getElementById('driverNotice').style.display = (val === 'CHAUFFEUR') ? 'block' : 'none';
        document.getElementById('adminNotice').style.display = (val === 'ADMIN') ? 'block' : 'none';
    });

    // 1. Écouter l'événement d'envoi du formulaire
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche la page de se recharger

        // Gestion du bouton et du loader
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('loader');
        
        // --- AJOUT PRO : VALIDATION DE LA CORRESPONDANCE ---
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('passwordMismatch');
        const confirmInput = document.getElementById('confirmPassword');

        if (password !== confirmPassword) {
            errorDiv.style.display = 'block'; // Affiche le message d'erreur
            confirmInput.classList.add('is-invalid-custom'); // Ajoute une bordure rouge
            return; // ARRÊTE L'EXÉCUTION
        } else {
            errorDiv.style.display = 'none';
            confirmInput.classList.remove('is-invalid-custom');
        }
        // ---------------------------------------------------

        // Activation de l'état de chargement
        btn.disabled = true;
        loader.style.display = 'inline-block';

        // 2. Préparation des données (DTO)
        const registerData = {
            username: document.getElementById('username').value,
            password: password,
            confirmPassword: confirmPassword, 
            role: document.getElementById('role').value
        };

        try {
            // 3. Appel à l'API Backend
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(registerData)
            });

            // CORRECTION PRO : Sécurisation du parsing JSON
            const contentType = response.headers.get("content-type");
            let result = {};
            if (contentType && contentType.indexOf("application/json") !== -1) {
                result = await response.json();
            }

            if (response.ok) {
                // 4. Succès : Redirection vers le login
                alert("Compte créé avec succès ! Connectez-vous pour commencer.");
                window.location.href = "/login"; 
            } else {
                // 5. Erreur (Ex: utilisateur déjà existant)
                alert("Erreur : " + (result.erreur || "Inscription échouée."));
                console.error("Détails:", result);
            }
        } catch (error) {
            console.error("Erreur réseau :", error);
            alert("Le serveur ne répond pas. Vérifiez votre connexion.");
        } finally {
            // Désactivation du chargement même en cas d'échec
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });

    // --- OPTIONNEL PRO : Effacer l'erreur quand l'utilisateur recommence à taper ---
    document.getElementById('confirmPassword').addEventListener('input', () => {
        document.getElementById('passwordMismatch').style.display = 'none';
        document.getElementById('confirmPassword').classList.remove('is-invalid-custom');
    });
</script>
</body>
</html>
