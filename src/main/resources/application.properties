spring.application.name=UberHaiti

# Gestion du Port
server.port=${PORT:8080}

# Profil actif
spring.profiles.active=${APP_MODE:dev}

# =========================================================================
# CONFIGURATION HYBRIDE (MYSQL LOCAL / POSTGRESQL AIVEN)
# =========================================================================

# URL : MySQL local par défaut. 
# Pour Aiven, passez DB_URL=jdbc:postgresql://pg-21f0dd7a-pg-uber-ouest-christopher.b.aivencloud.com:22088/defaultdb?sslmode=require
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/uber_ouest?useSSL=false&serverTimezone=UTC}

# Utilisateur : root par défaut. Pour Aiven, passez DB_USER=avnadmin
spring.datasource.username=${DB_USER:root}

# Mot de passe : votre passe local par défaut. Pour Aiven, passez DB_PASS=[VOTRE_MOT_DE_PASSE_AIVEN]
spring.datasource.password=${DB_PASS:49358485}

# Driver : MySQL par défaut. Pour Aiven, passez DB_DRIVER=org.postgresql.Driver
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Dialecte Hibernate : MySQL par défaut. 
# Pour Aiven, passez DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# Gestion automatique du schéma
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =========================================================================
# Clés de sécurité JWT
# =========================================================================
app.jwt.secret=${JWT_SECRET:UberHaitiOuest2026_SecuriteMaximale_PortAuPrince_Haiti_LongKeyHS512}
app.jwt.expiration=86400000

# Sécurité des erreurs
server.error.include-message=always
server.error.include-stacktrace=never
logging.level.org.springframework.security=DEBUG

