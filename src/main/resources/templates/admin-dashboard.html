<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Ouest - Administration Centrale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #276ef1;
            --bg-light: #f6f6f6;
            --text-dark: #333333;
            --text-muted: #757575;
            --card-bg: #ffffff;
            --success: #05a357;
            --danger: #e11d48;
            --warning: #f59e0b;
            --border: #e2e2e2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-light); display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background-color: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; font-size: 1.4rem; font-weight: bold; border-bottom: 1px solid var(--border); text-align: center; }
        .nav-links { list-style: none; padding: 20px 0; }
        .nav-links li { padding: 15px 24px; cursor: pointer; transition: 0.2s; color: var(--text-dark); display: flex; align-items: center; gap: 15px; }
        .nav-links li:hover, .nav-links li.active { background-color: #f0f0f0; color: var(--secondary-color); border-left: 4px solid var(--secondary-color); }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* CARDS */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-title { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .card-value { font-size: 1.8rem; font-weight: bold; display: block; margin-top: 5px; }

        /* TABLES */
        .table-container { background: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background-color: #fafafa; color: var(--text-muted); font-size: 0.85rem; }

        /* BADGES & BUTTONS */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .bg-success { background: #d1fae5; color: #065f46; }
        .bg-danger { background: #fee2e2; color: #991b1b; }
        .bg-warning { background: #fef3c7; color: #92400e; }

        .btn-action { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: 0.2s; margin-right: 5px; }
        .btn-suspend { background-color: var(--danger); color: white; }
        .btn-activate { background-color: var(--success); color: white; }
        .btn-validate { background-color: var(--secondary-color); color: white; }
        .btn-logout { background-color: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Uber Haiti <span style="color:var(--secondary-color)">PRO</span></div>
        <ul class="nav-links">
            <li class="active" onclick="showSection('dashboard-section')"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></li>
            <li onclick="showSection('users-section')"><i class="fa-solid fa-users-gear"></i> <span>Utilisateurs</span></li>
        </ul>
        <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--border);">
            <button class="btn-logout" onclick="logout()" style="width: 100%;">Déconnexion</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="dashboard-section" class="section active">
            <div class="header"><h1>Tableau de Bord</h1></div>
            <div class="dashboard-cards">
                <div class="card"><span class="card-title">Utilisateurs</span><span class="card-value" id="stat-users">0</span></div>
                <div class="card"><span class="card-title">Courses</span><span class="card-value" id="stat-rides">0</span></div>
                <div class="card"><span class="card-title">Revenu (HTG)</span><span class="card-value" id="stat-revenue" style="color:var(--success)">0</span></div>
            </div>
            <div class="table-container">
                <h3>Dernières Courses</h3>
                <table id="rides-table">
                    <thead><tr><th>ID</th><th>Client</th><th>Destination</th><th>Tarif</th><th>Statut</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="users-section" class="section">
            <div class="header"><h1>Gestion des Utilisateurs</h1></div>
            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Rôle</th>
                            <th>Compte</th>
                            <th>Validation</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const API_URL = 'http://localhost:8091/api/admin';
        // Utilisation de la clé 'token' pour la cohérence avec le dashboard passager
        const token = localStorage.getItem('token'); 
        
        // --- PROTECTION DE LA ROUTE ---
        // Si pas de token, redirection immédiate vers le login
        if (!token) { window.location.href = "/login"; }

        const headers = { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${token}` 
        };

        // Navigation entre les sections
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'dashboard-section') { loadDashboardData(); }
            if(id === 'users-section') { loadUsers(); }
        }

        // --- GESTION DES ERREURS API (401/403) ---
        function handleApiError(response) {
            if (response.status === 401 || response.status === 403) {
                alert("Session expirée ou accès non autorisé.");
                logout();
            }
            return response;
        }

        // --- CHARGEMENT DATA DASHBOARD ---
        async function loadDashboardData() {
            try {
                const resStats = await fetch(`${API_URL}/stats`, { headers }).then(handleApiError);
                const stats = await resStats.json();
                document.getElementById('stat-users').innerText = stats.totalUsers;
                document.getElementById('stat-rides').innerText = stats.totalRides;
                document.getElementById('stat-revenue').innerText = (stats.totalRevenueHTG || 0).toLocaleString();

                const resRides = await fetch(`${API_URL}/rides`, { headers }).then(handleApiError);
                const rides = await resRides.json();
                const tbody = document.querySelector('#rides-table tbody');
                tbody.innerHTML = rides.map(r => `
                    <tr>
                        <td>#${r.id}</td>
                        <td>${r.passengerName || r.passengerId || 'N/A'}</td>
                        <td>${r.destination}</td>
                        <td>${r.fare} HTG</td>
                        <td><span class="badge ${r.paymentStatus === 'PAYÉ' ? 'bg-success' : 'bg-warning'}">${r.paymentStatus || 'PENDING'}</span></td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Erreur stats:", err); }
        }

        // --- CHARGEMENT & GESTION UTILISATEURS ---
        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/users`, { headers }).then(handleApiError);
                const users = await res.json();
                const tbody = document.querySelector('#users-table tbody');
                tbody.innerHTML = users.map(u => {
                    const statusText = u.active ? 'Actif' : 'Suspendu';
                    const statusClass = u.active ? 'bg-success' : 'bg-danger';
                    const validationText = u.driverValidated ? 'Validé' : 'Non validé';
                    const validationClass = u.driverValidated ? 'bg-success' : 'bg-warning';
                    
                    // On n'affiche le bouton valider que si c'est un chauffeur non validé
                    const showValidateBtn = (u.role === 'DRIVER' || u.role === 'CHAUFFEUR') && !u.driverValidated;

                    return `
                        <tr>
                            <td>${u.id}</td>
                            <td><strong>${u.username}</strong></td>
                            <td>${u.role}</td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                            <td><span class="badge ${validationClass}">${validationText}</span></td>
                            <td>
                                <button class="btn-action ${u.active ? 'btn-suspend' : 'btn-activate'}" onclick="toggleStatus(${u.id})">
                                    ${u.active ? 'Suspendre' : 'Activer'}
                                </button>
                                ${showValidateBtn ? `<button class="btn-action btn-validate" onclick="validateDriver(${u.id})">Valider</button>` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { console.error("Erreur utilisateurs:", err); }
        }

        async function toggleStatus(id) {
            if(!confirm("Changer le statut de cet utilisateur ?")) return;
            const res = await fetch(`${API_URL}/users/${id}/toggle-status`, { method: 'PUT', headers }).then(handleApiError);
            const data = await res.json();
            alert(data.message || data.error);
            loadUsers();
        }

        async function validateDriver(id) {
            if(!confirm("Valider officiellement ce chauffeur ?")) return;
            const res = await fetch(`${API_URL}/users/${id}/validate`, { method: 'PUT', headers }).then(handleApiError);
            const data = await res.json();
            alert(data.message || data.error);
            loadUsers();
        }

        // --- DÉCONNEXION ---
        function logout() {
            localStorage.removeItem('token');
            window.location.href = "/login";
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
